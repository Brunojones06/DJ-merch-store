<script>
    // Payment done — clear the bag before cart.js reads it.
    try { localStorage.removeItem('diana-cart'); } catch (_e) {}
  </script>
<style>
    .ink-bleed { filter: url(#ink-bleed-filter); }

    .halftone-overlay {
      background-image: radial-gradient(#abd600 10%, transparent 11%);
      background-size: 8px 8px;
      opacity: 0.15;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8) rotate(-5deg); }
      70% { transform: scale(1.05) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(-1deg); }
    }

    .animate-pop-in {
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    .sticker-slap:hover {
      transform: scale(1.05) rotate(0deg) !important;
      box-shadow: 12px 12px 0px 0px rgba(0,0,0,1) !important;
    }

    @keyframes float-icon {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }

    .animate-float-subtle { animation: float-icon 4s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after {
        animation-delay: -1ms !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0s !important;
        transition-delay: 0s !important;
      }
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md relative overflow-x-hidden min-h-screen flex flex-col">
<svg aria-hidden="true" style="position: absolute; width: 0; height: 0;">

<fedisplacementmap in="SourceGraphic" in2="noise" scale="2"></fedisplacementmap>
</filter>
</svg>

</nav>

</div>

<p class="font-body-md text-on-surface-variant max-w-md">You're in. A receipt is on its way to your inbox — your gear ships within 3–5 working days. Everything's printed by hand, so give it a minute.</p>
<div class="flex flex-wrap justify-center gap-6 mt-2">
<a class="sticker-slap cursor-pointer inline-block px-10 py-5 bg-primary-fixed text-on-primary-fixed font-headline-lg text-2xl uppercase border-4 border-black shadow-[6px_6px_0px_0px_#000] transition-all -rotate-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-4 focus-visible:ring-offset-surface-container" href="shop.html">Keep Shopping</a>
<a class="sticker-slap cursor-pointer inline-block px-10 py-5 bg-transparent border-4 border-primary-fixed text-primary-fixed font-headline-lg text-2xl uppercase transition-all rotate-1 hover:bg-primary-fixed hover:text-black focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-fixed focus-visible:ring-offset-4 focus-visible:ring-offset-surface-container" href="index.html">Back Home</a>

</footer>
